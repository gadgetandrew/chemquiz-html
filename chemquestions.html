<style>

<body>

<div class="box">


<h3 id="counter"></h3>

<div id="answer"></div>

<!-- 🔢 GO TO CARD -->
<div>
<button onclick="startStudy()">▶ Start</button>

</div>
<!-- 🎯 MAIN BUTTONS -->
<button onclick="showAnswer()">Show Answer</button>
<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="resetStudy()">🔄 Restart</button>

<h3 id="score"></h3>

</div>

const questions = data
.split("\n")
.map(line => line.trim())
.filter(line => line && line.includes("|"))
.map(line => {
  const parts = line.split("|");
  return {
    q: parts[0],
    a: parts[1]
  };
});

let current = 0;

// Load question
// START BUTTON
function startStudy(){
  current = 0;
  saveProgress();
  loadQuestion();
}

// LOAD QUESTION
function loadQuestion(){
  document.getElementById("question").innerText = questions[current].q;
  document.getElementById("answer").innerText = "";

  // ✅ ADD THIS LINE
  document.querySelector("button[onclick='showAnswer()']").innerText = "Show Answer";

  document.getElementById("counter").innerText =
    "Card " + (current + 1) + " / " + questions.length;
}

// SHOW / HIDE ANSWER
function showAnswer(){
  let ans = document.getElementById("answer");
  let btn = document.querySelector("button[onclick='showAnswer()']");

  if(ans.innerText === ""){
    ans.innerText = questions[current].a;
    btn.innerText = "Hide Answer";
  } else {
    ans.innerText = "";
    btn.innerText = "Show Answer";
  }
}

// NEXT
function nextQuestion(){
  if(current < questions.length - 1){
    current++;
    saveProgress();
    loadQuestion();
  }
}

// PREVIOUS
function prevQuestion(){
  if(current > 0){
    current--;
    saveProgress();
    loadQuestion();
  }
}

// RESET
function resetStudy(){
  current = 0;
  localStorage.removeItem("study_index");
  loadQuestion();
}

// SHUFFLE
function shuffleCards(){
  for (let i = questions.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }

  current = 0;
  saveProgress();
  loadQuestion();
}

// GO TO CARD
function goToCard(){
  let num = parseInt(document.getElementById("goToCard").value) || 0;

  if(num >= 1 && num <= questions.length){
    current = num - 1;
    saveProgress();
    loadQuestion();
    document.getElementById("goToCard").value = "";
  } else {
    alert("Enter a number between 1 and " + questions.length);
  }
}

// SAVE
function saveProgress(){
  localStorage.setItem("study_index", current);
}

// LOAD PROGRESS (optional)
function loadProgress(){
  let saved = localStorage.getItem("study_index");
  if(saved !== null){
    current = parseInt(saved);
  }
}

// ENTER KEY SUPPORT
document.getElementById("goToCard").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    goToCard();
  }
});

// START


</script>
