const questions = rawQuestions
.split("\n")
.map(line => line.trim())
.filter(line => line && line.split("|").length === 6
)
.map(line => {
 const parts = line.split("|");
 return {
  q: parts[0],
  options: [parts[1], parts[2], parts[3], parts[4]],
  answer: parseInt(parts[5])
 };
});

let current = 0;
let score = 0;
let currentCorrect = 0;

function loadQuestion(){
 document.getElementById("nextBtn").style.display = "none";
 document.getElementById("feedback").innerText = "";

 let q = questions[current];

 document.getElementById("qNumber").innerText =
 "Question " + (current + 1) + " / " + questions.length;

 document.getElementById("question").innerText = q.q;

 let answersDiv = document.getElementById("answers");
 answersDiv.innerHTML = "";

 // Shuffle answers
let shuffled = q.options
  .map((opt, index) => ({ opt, index }))
 for (let i = shuffled.length - 1; i > 0; i--) {
  let j = Math.floor(Math.random() * (i + 1));
  [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
} 

// Store correct answer AFTER shuffle
currentCorrect = shuffled.findIndex(item => item.index === q.answer);

shuffled.forEach((item, index) => {
  let btn = document.createElement("button");
  btn.innerText = item.opt;
  btn.onclick = () => checkAnswer(index);
  answersDiv.appendChild(btn);
});
}

function checkAnswer(selected){
  if(selected === currentCorrect){
    document.getElementById("feedback").innerText = "Correct!";
    score++;
  } else {
    let correctText = questions[current].options[questions[current].answer];
    document.getElementById("feedback").innerText =
      "Wrong! Correct answer: " + correctText;
  }

  saveProgress(); // ✅ SAVE HERE

  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion(){
  current++;

  saveProgress(); 

  if(current < questions.length){
    loadQuestion();
  } else {
    endQuiz();
  }
}

function goToQuestion(){
  let num = parseInt(document.getElementById("goTo").value);

  if(num >= 1 && num <= questions.length){
    current = num - 1;
    saveProgress();
    loadQuestion();
  } else {
    alert("Enter a number between 1 and " + questions.length);
  }
}

  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("feedback").innerText = "";

  let q = questions[current];

  document.getElementById("qNumber").innerText =
  "Question " + (current + 1) + " / " + questions.length;

  document.getElementById("question").innerText = q.q;

  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  let shuffled = q.options
    .map((opt, index) => ({ opt, index }))
    .sort(() => Math.random() - 0.5);

  currentCorrect = shuffled.findIndex(item => item.index === q.answer);

  shuffled.forEach((item, index) => {
    let btn = document.createElement("button");
    btn.innerText = item.opt;
    btn.onclick = () => checkAnswer(index);
    answersDiv.appendChild(btn);
  });
}

function saveProgress(){
  localStorage.setItem("quiz_current", current);
  localStorage.setItem("quiz_score", score);
}

function loadProgress(){
  let savedCurrent = localStorage.getItem("quiz_current");
  let savedScore = localStorage.getItem("quiz_score");

  if(savedCurrent !== null){
    current = parseInt(savedCurrent);
  }

  if(savedScore !== null){
    score = parseInt(savedScore);
  }
}

function resetQuiz(){
  localStorage.removeItem("quiz_current");
  localStorage.removeItem("quiz_score");

  current = 0;
  score = 0;

  document.getElementById("feedback").innerText = "";
  document.getElementById("score").innerText = "";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("goTo").value = "";

  loadQuestion();
}

// START APP
loadProgress();
loadQuestion();

</script>
